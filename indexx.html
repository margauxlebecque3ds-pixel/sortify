<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sortify</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<!-- PWA meta tags (iOS + Android) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sortify">
<meta name="theme-color" content="#52B788">
<link rel="apple-touch-icon" id="pwa-icon">
<link rel="manifest" id="pwa-manifest">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #E8EDE8; font-family: 'Manrope', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  @keyframes pulse-ring {
    0%,100% { transform: scale(1); opacity:.7; }
    50%      { transform: scale(1.07); opacity:.3; }
  }
  @keyframes scan-line {
    0%   { top:16%; opacity:0; }
    5%   { opacity:1; }
    95%  { opacity:1; }
    100% { top:84%; opacity:0; }
  }
  @keyframes corner-blink {
    0%,100% { opacity:.5; }
    50%     { opacity:1; }
  }
  @keyframes slide-up {
    from { transform:translateY(20px); opacity:0; }
    to   { transform:translateY(0);    opacity:1; }
  }
  @keyframes badge-pop {
    0%   { transform:scale(.7); opacity:0; }
    70%  { transform:scale(1.08); }
    100% { transform:scale(1);   opacity:1; }
  }
  @keyframes xp-fill {
    from { width:0%; }
    to   { width:62%; }
  }

  .pulse-ring  { animation: pulse-ring 2s ease-in-out infinite; }
  .scan-line   { animation: scan-line 2.2s ease-in-out infinite; }
  .corner-blink{ animation: corner-blink 2s ease-in-out infinite; }
  .slide-up    { animation: slide-up .35s ease forwards; }
  .badge-pop   { animation: badge-pop .45s cubic-bezier(.34,1.56,.64,1) forwards; }
  .xp-fill     { animation: xp-fill 1.2s ease .3s forwards; }

  ::-webkit-scrollbar { display:none; }
  * { -ms-overflow-style:none; scrollbar-width:none; }
</style>
</head>
<body>
<script type="text/babel">

// ─── DESIGN SYSTEM — LIGHT MODE ─────────────────────────────
const DS = {
  bg:        '#F0F4F0',
  bgAlt:     '#E8EEE8',
  primary:   '#2E7D32',
  accent:    '#43A047',
  accentLight: '#E8F5E9',
  surface:   '#FFFFFF',
  surface2:  '#F7FAF7',
  gold:      '#F59E0B',
  green100:  '#E8F5E9',
  green200:  '#C8E6C9',
  textPrimary:   '#1A1A1A',
  textSecondary: '#5A6B5A',
  textMuted:     '#9BA89B',
  border:    'rgba(0,0,0,0.07)',
  shadow:    '0 2px 16px rgba(46,125,50,0.10)',
  shadowSm:  '0 1px 6px rgba(0,0,0,0.07)',
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#43A047",
  "cardRadius": 23,
  "darkMode": false
}/*EDITMODE-END*/;

// ─── SHARED ──────────────────────────────────────────────────

function GoldPoints({ pts = '1 240', size = 13 }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:5,
      background:'#FFF8E1', borderRadius:99, padding:'5px 11px',
      border:'1px solid #FDE68A' }}>
      <Icon name="coin" size={size+3} color="#F59E0B" />
      <span style={{ color:'#B45309', fontWeight:800, fontSize:size }}>{pts} pts</span>
    </div>
  );
}

function Avatar({ initials='AM', size=36, bg='#C8E6C9', color='#2E7D32' }) {
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', background:bg,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontWeight:800, fontSize:size*0.38, color, flexShrink:0,
      border:`2px solid ${DS.green200}` }}>
      {initials}
    </div>
  );
}

function Card({ children, style={}, pad=18 }) {
  return (
    <div style={{ background:DS.surface, borderRadius:20, padding:pad,
      boxShadow:DS.shadowSm, border:`1px solid ${DS.border}`, ...style }}>
      {children}
    </div>
  );
}

function SectionHeader({ title, action }) {
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'4px 16px 10px' }}>
      <h2 style={{ color:DS.textPrimary, fontWeight:800, fontSize:16 }}>{title}</h2>
      {action && <span style={{ color:DS.accent, fontSize:13, fontWeight:700, cursor:'pointer' }}>{action}</span>}
    </div>
  );
}

function Chip({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding:'7px 16px', borderRadius:99, border:'none', cursor:'pointer',
      background: active ? DS.accent : DS.surface,
      color: active ? '#fff' : DS.textSecondary,
      fontFamily:'Manrope', fontWeight:700, fontSize:13, flexShrink:0,
      boxShadow: active ? `0 3px 10px ${DS.accent}44` : DS.shadowSm,
      transition:'all .18s',
    }}>{label}</button>
  );
}

// ─── ICON SYSTEM — Phosphor-style duotone illustrations ──────
// Every icon = filled silhouette (0.2 opacity) + outlined detail path,
// hand-drawn feel inspired by the reference SVG (viewBox 0 0 24 24)
function Icon({ name, size=24, color='#43A047' }) {
  const stroke = { fill:'none', stroke:color, strokeWidth:1.6, strokeLinecap:'round', strokeLinejoin:'round' };
  const fill   = { fill:color, opacity:0.2 };
  const accent = { fill:color, opacity:0.55 };

  const M = {
    // === RECYCLABLE ITEMS ===
    bottle: (
      <svg width={size} height={size} viewBox="0 0 24 24">
        <path {...fill} d="M9.5 7.5h5l.5 3c0 0 1.5 1 1.5 4v6c0 1-.7 1.5-1.5 1.5h-6c-.8 0-1.5-.5-1.5-1.5v-6c0-3 1.5-4 1.5-4z"/>

function iconForWaste(name) {
  if (!name) return 'bottle';
  const n = name.toLowerCase();
  if (n.includes('bouteill') || n.includes('plasti')) return 'bottle';
  if (n.includes('carton') || n.includes('boîte') || n.includes('boite') || n.includes('emball')) return 'box';
  if (n.includes('bocal') || n.includes('verre') || n.includes('pot')) return 'jar';
  if (n.includes('pile') || n.includes('batter') || n.includes('électron')) return 'battery';
  if (n.includes('journal') || n.includes('papier') || n.includes('magazine')) return 'newspaper';
  if (n.includes('canette') || n.includes('alumin') || n.includes('métal') || n.includes('conserve')) return 'jar';
  if (n.includes('feuille') || n.includes('organi') || n.includes('compost') || n.includes('trognon')) return 'leaf';
  return 'bottle';
}

function binColor(bin) {
  if (!bin) return '#F59E0B';
  const b = bin.toLowerCase();
  if (b.includes('jaune')) return '#F59E0B';
  if (b.includes('vert')) return '#43A047';
  if (b.includes('gris') || b.includes('noir')) return '#6B7280';
  if (b.includes('rouge')) return '#EF4444';
  return '#8B5CF6';
}

// Compress image to max 1024px / JPEG 80% before sending (phone photos are 4-8 MB)
function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1024;
      let { width, height } = img;
      if (width > MAX || height > MAX) {
        if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
        else { width = Math.round(width * MAX / height); height = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = ev => resolve({ base64: ev.target.result.split(',')[1], mediaType: 'image/jpeg' });
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.8);
    };
    img.src = url;
  });
}

        setScanning(false);
        setProxyInput('');
        setShowProxyModal(true);

      if (!res.ok) {

// ─── APP ROOT ─────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState(() => localStorage.getItem('sortify2_screen') || 'home');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('sortify2_screen', screen); }, [screen]);

  React.useEffect(() => {
    const h = e => {
      if (e.data?.type==='__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const applyTweak = (k,v) => {
    const next = { ...tweaks, [k]:v };
    setTweaks(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [k]:v } }, '*');
  };

  const screens = {
    scan:      <ScreenScan      onNav={setScreen} tweaks={tweaks} />,
    details:   <ScreenDetails   onNav={setScreen} />,
    home:      <ScreenHome      onNav={setScreen} />,
    boutique:  <ScreenBoutique />,
    community: <ScreenCommunity />,
    profil:    <ScreenProfil />,
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:14, padding:20 }}>
      {/* label */}
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width:32, height:32, borderRadius:9,
          background:`linear-gradient(135deg, ${DS.accent}, ${DS.primary})`,
          display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="logo" size={18} color="#fff" /></div>
        <span style={{ color:'rgba(255,255,255,0.55)', fontFamily:'Manrope', fontWeight:800, fontSize:17 }}>Sortify</span>
        <span style={{ color:'rgba(255,255,255,0.2)', fontFamily:'Manrope', fontSize:11, marginLeft:2 }}>v2 — light mode</span>
      </div>

      <IOSDevice width={390} height={844} dark={false}>
        <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:200 }}>
          <IOSStatusBar dark={screen==='scan'} time="9:41" />
        </div>
        <div style={{ position:'absolute', inset:0, overflow:'hidden' }}>
          <div key={screen} className="slide-up" style={{ height:'100%', paddingTop: (screen==='scan'||screen==='details') ? 0 : 52 }}>
            {screens[screen] || screens.home}
          </div>
        </div>
        {/* bottom nav */}
        <BottomNav active={screen} onNav={setScreen} />
      </IOSDevice>

      {/* screen pills */}
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'center' }}>
        {[['scan','Scan'],['details','Détails'],['home','Home'],['boutique','Boutique'],['community','Communauté'],['profil','Profil']].map(([k,l]) => (
          <button key={k} onClick={() => setScreen(k)} style={{
            padding:'6px 12px', borderRadius:99, border:'none', cursor:'pointer',
            background: screen===k ? DS.accent : 'rgba(255,255,255,0.12)',
            color: screen===k ? '#fff' : 'rgba(255,255,255,0.5)',
            fontFamily:'Manrope', fontWeight:700, fontSize:11, transition:'all .18s',
          }}>{l}</button>
        ))}
      </div>

      {/* tweaks */}
      {showTweaks && (
        <div style={{ position:'fixed', bottom:24, right:24, background:'#fff', borderRadius:20,
          padding:20, width:230, border:`1px solid ${DS.border}`, zIndex:9999,
          boxShadow:'0 8px 40px rgba(0,0,0,0.12)' }}>
          <p style={{ color:DS.textPrimary, fontWeight:800, fontSize:14, marginBottom:14 }}>Tweaks</p>
          <label style={{ color:DS.textSecondary, fontSize:12, fontWeight:700, display:'block', marginBottom:8 }}>Couleur accent</label>
          <div style={{ display:'flex', gap:8, marginBottom:14 }}>
            {['#43A047','#2563EB','#DB2777','#EA580C'].map(c => (
              <button key={c} onClick={() => applyTweak('accentColor', c)} style={{
                width:28, height:28, borderRadius:'50%', background:c, border:'none', cursor:'pointer',
                outline: tweaks.accentColor===c ? '2px solid #1A1A1A' : 'none', outlineOffset:2 }} />
            ))}
          </div>
          <label style={{ color:DS.textSecondary, fontSize:12, fontWeight:700,
            display:'flex', justifyContent:'space-between', cursor:'pointer' }}>
            Rayon des cartes
            <input type="range" min="12" max="28" value={tweaks.cardRadius}
              onChange={e => applyTweak('cardRadius', +e.target.value)}
              style={{ width:80 }} />
          </label>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

<!-- ── PWA SETUP (icon + manifest + service worker) ── -->
<script>
!function(){
  /* Leaf logo SVG → 512×512 PNG via canvas */
  var SVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">'
    +'<rect width="512" height="512" rx="115" ry="115" fill="#1B4332"/>'
    +'<g transform="translate(256,256) scale(14) translate(-12,-12)">'
    +'<path d="M20 4c0 0-9-1-13 3s-3 11 0 13 9-1 11-5 2-11 2-11z" fill="#fff"/>'
    +'<path d="M20 4L7 17" stroke="#1B4332" stroke-width="2.2"'
    +' stroke-linecap="round" fill="none"/>'
    +'</g></svg>';

  var img=new Image();
  img.onload=function(){
    var c=document.createElement('canvas');
    c.width=c.height=512;
    c.getContext('2d').drawImage(img,0,0);
    var png=c.toDataURL('image/png');

    /* apple-touch-icon */
    document.getElementById('pwa-icon').href=png;

    /* Web App Manifest */
    var mf=JSON.stringify({
      name:'Sortify',
      short_name:'Sortify',
      description:'Scanne tes déchets, trie mieux, gagne des points',
      start_url:'/',
      scope:'/',
      display:'standalone',
      orientation:'portrait-primary',
      background_color:'#1B4332',
      theme_color:'#52B788',
      icons:[
        {src:png,sizes:'512x512',type:'image/png',purpose:'any maskable'}
      ]
    });
    document.getElementById('pwa-manifest').href=
      URL.createObjectURL(new Blob([mf],{type:'application/json'}));
  };
  img.src='data:image/svg+xml,'+encodeURIComponent(SVG);

  /* Service worker — essaie /sw.js (proxy.py), sinon blob URL de secours */
  if('serviceWorker' in navigator && /^https?:/.test(location.protocol)){
    var SW="const C='sortify-v1';"
      +"self.addEventListener('install',e=>{"
      +"  self.skipWaiting();"
      +"  e.waitUntil(caches.open(C).then(c=>c.add('/')));"
      +"});"
      +"self.addEventListener('activate',e=>e.waitUntil(clients.claim()));"
      +"self.addEventListener('fetch',e=>{"
      +"  if(e.request.mode==='navigate')"
      +"    e.respondWith(fetch(e.request).catch(()=>caches.match('/')));"
      +"});";
    navigator.serviceWorker.register('/sw.js').catch(function(){
      /* /sw.js absent (ex: Cloudflare Worker) — blob URL de secours */
      navigator.serviceWorker.register(
        URL.createObjectURL(new Blob([SW],{type:'text/javascript'}))
      ).catch(function(){});
    });
  }
}();
</script>
